---
layout: default
---
<article class="wrap post">
  <header class="post-header">
    <a class="back-link" href="{{ '/projects/' | relative_url }}">← Tüm projeler</a>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.summary %}<p class="post-summary">{{ page.summary }}</p>{% endif %}
    <div class="post-meta">
      {% if page.tech %}{% for t in page.tech %}<span class="tag">{{ t }}</span>{% endfor %}{% endif %}
    </div>
    <div class="project-actions">
      {% if page.repo %}<a class="btn" href="{{ page.repo }}" target="_blank" rel="noopener">Kaynak Kodu</a>{% endif %}
      {% if page.demo %}<a class="btn btn-ghost" href="{{ page.demo }}" target="_blank" rel="noopener">Canlı Demo</a>{% endif %}
    </div>
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
