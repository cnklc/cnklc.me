---
layout: default
---
<article class="wrap post">
  <header class="post-header">
    <a class="back-link" href="{{ '/blog/' | relative_url }}">← Tüm yazılar</a>
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%-d %B %Y" }}</time>
      {% if page.tags and page.tags.size > 0 %}
        <span class="dot">·</span>
        {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
      {% endif %}
    </div>
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
