# Site
title: "Can KILIÇ"
tagline: "Senior .NET Developer · AI & Otomasyon"
description: >-
  Can KILIÇ — Senior .NET Developer. 10 yıldır C#, .NET ve PostgreSQL ile uçtan
  uca yazılım geliştiriyorum; yapay zeka ve otomasyon çözümlerine odaklanıyorum.
  Geliştirdiğim projeler ve blog yazıları.
url: "https://cnklc.me"
baseurl: ""
lang: tr

# Author / contact
author:
  name: "Can KILIÇ"
  email: "cnklc@ymail.com"

social:
  github: "cnklc"
  linkedin: "cnk1c"
  email: "cnklc@ymail.com"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:title/
timezone: Europe/Istanbul

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
    values:
      lang: tr
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: "en"
    values:
      lang: en

# Pagination / lists
paginate: 5
paginate_path: "/blog/page:num/"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .github
